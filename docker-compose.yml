# =============================================================================
#  Online Food Ordering System — self-contained "cell"
#
#  Brings up the whole stack on one Docker network:
#    nginx (front door) -> frontend (Next.js) + backend (Express)
#    backend -> db (Postgres) + redis
#    adminer -> db (DB web UI)
#
#  Entry points (host ports chosen to avoid your other running stacks):
#    http://localhost:8090   the app (via nginx)
#    http://localhost:8091   Adminer (DB UI)   — server: db, user/pass: postgres, db: foodordering
#    localhost:5433          Postgres
#    localhost:6380          Redis
#
#  The Postgres volume is the SAME one the migration populated, so all the
#  data migrated from Supabase is already here.
#
#  Usage:
#    docker compose up -d --build
#    docker compose logs -f
#    docker compose down            # stop (keeps data)
#    docker compose down -v         # stop + wipe volumes
# =============================================================================
name: food-ordering-cell

services:
  db:
    build:
      context: ./docker/postgres
    container_name: food_ordering_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: foodordering
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d foodordering"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: food_ordering_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  adminer:
    image: adminer:latest
    container_name: food_ordering_adminer
    restart: unless-stopped
    ports:
      - "8091:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db

  backend:
    build:
      context: ./backend
    container_name: food_ordering_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "8000"
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/foodordering"
      DIRECT_URL: "postgresql://postgres:postgres@db:5432/foodordering"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "super_secret_jwt_key_please_change_in_production"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # Browser-facing origin -> nginx (production domain).
        NEXT_PUBLIC_API_URL: "https://restobuddy.in"
    container_name: food_ordering_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Server-side (manifest route) talks to the backend directly on the network.
      INTERNAL_API_URL: "http://backend:8000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: food_ordering_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;"

volumes:
  pgdata:
  redisdata:
