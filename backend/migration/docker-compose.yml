# Local Postgres to replace Supabase.
# Runs in PARALLEL with the live Supabase DB — it listens on host port 5433
# so it never collides with a local Postgres (5432) or anything else.
#
#   docker compose -f migration/docker-compose.yml up -d
#
# Connection string for the app once you cut over:
#   postgresql://postgres:postgres@localhost:5433/foodordering
services:
  db:
    image: postgres:17-alpine
    container_name: food_ordering_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: foodordering
    ports:
      - "5433:5432"
    volumes:
      - food_ordering_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d foodordering"]
      interval: 3s
      timeout: 5s
      retries: 20

volumes:
  food_ordering_pgdata:
