# =============================================================================
#  Production nginx for restobuddy.in
#
#  Vhosts:
#    restobuddy.in / www          -> the app          (Let's Encrypt cert)
#    jenkins.restobuddy.in        -> Jenkins           (Let's Encrypt cert, Cloudflare proxy OFF)
#    db.restobuddy.in             -> Adminer + BasicAuth (Let's Encrypt cert, Cloudflare proxy OFF)
#
#  Extra nginx mounts (docker-compose.override.yml):
#    ./docker/nginx/.htpasswd  -> /etc/nginx/.htpasswd
# =============================================================================

resolver 127.0.0.11 valid=10s;   # Docker DNS — lets upstreams re-resolve after redeploys (fixes the stale-IP 502)

upstream backend  { server backend:8000; }
upstream frontend { server frontend:3000; }

# ---- shared proxy header snippet is inlined per server via these defaults ----

# ============================ APP (unchanged) ================================
server {
    listen 80;
    server_name restobuddy.in www.restobuddy.in;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name restobuddy.in www.restobuddy.in;

    ssl_certificate     /etc/letsencrypt/live/restobuddy.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/restobuddy.in/privkey.pem;

    client_max_body_size 25m;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    location = /api/manifest { proxy_pass http://frontend; }
    location /api/           { proxy_pass http://backend; }
    location /               { proxy_pass http://frontend; }
}

# ============================ JENKINS ========================================
server {
    listen 80;
    server_name jenkins.restobuddy.in;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name jenkins.restobuddy.in;

    ssl_certificate     /etc/letsencrypt/live/jenkins.restobuddy.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jenkins.restobuddy.in/privkey.pem;

    client_max_body_size 50m;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    location / {
        set $jenkins http://jenkins:8080;
        proxy_pass $jenkins;
        proxy_read_timeout 300s;   # long-running builds / websocket
    }
}

# ============================ ADMINER (db) ===================================
server {
    listen 80;
    server_name db.restobuddy.in;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name db.restobuddy.in;

    ssl_certificate     /etc/letsencrypt/live/db.restobuddy.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/db.restobuddy.in/privkey.pem;

    client_max_body_size 50m;

    # HTTP Basic Auth gate in front of the DB admin UI
    auth_basic           "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        set $adminer http://adminer:8080;
        proxy_pass $adminer;
    }
}
