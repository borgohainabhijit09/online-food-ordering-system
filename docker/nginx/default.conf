# nginx — single front door for the cell.
# Browser hits http://localhost:8090 and nginx fans out to the right service.

upstream backend  { server backend:8000; }
upstream frontend { server frontend:3000; }

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    # Common proxy headers — set once, inherited by all locations below.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Next.js owns this EXACT path (PWA manifest). Must come before /api/.
    location = /api/manifest {
        proxy_pass http://frontend;
    }

    # Everything else under /api/* -> Express backend.
    location /api/ {
        proxy_pass http://backend;
    }

    # App, static assets, _next, etc. -> Next.js.
    location / {
        proxy_pass http://frontend;
    }
}
